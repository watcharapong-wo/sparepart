<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - it Spare part System</title>
  <link rel="stylesheet" href="styles.css?v=1.1">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">it Spare part System <span data-i18n="manageUsers">- Manage Users</span></div>
    <div class="nav-links">
      <a href="dashboard.html" data-i18n="dashboard">Dashboard</a>
      <a href="movements.html" data-i18n="movements">Movements</a>
      <a href="index.html" data-role-required="admin,co-admin" data-i18n="spareParts">Spare Parts</a>
      <a href="users.html" class="active" id="nav-users" data-role-required="admin" data-i18n="manageUsers">Manage Users</a>
      <a href="logs.html" data-role-required="admin" data-i18n="activityLogs">Activity Logs</a>
      <span id="user-status"></span>
      <a href="#" id="logout-btn" data-i18n="logout">Logout</a>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="dashboard-grid">
      <!-- Add User Form -->
      <div class="card">
        <div class="card-title" data-i18n="manageUsers">Manage Users</div>
        <form id="add-user-form" class="form-grid" style="grid-template-columns: 1fr;">
          <div class="stacked-form-group">
            <label data-i18n="username">Username:</label>
            <input type="text" id="reg-username" required>
          </div>
          <div class="stacked-form-group">
            <label data-i18n="password">Password:</label>
            <input type="password" id="reg-password" required>
          </div>
          <div class="stacked-form-group">
            <label data-i18n="role">Role:</label>
            <select id="reg-role" required>
              <option value="viewer">Viewer</option>
              <option value="staff">Staff</option>
              <option value="co-admin">Co-Admin</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-actions" style="margin-top: 8px;">
            <button type="submit" class="btn btn-primary" data-i18n="submit">Create User</button>
          </div>
        </form>
      </div>

      <!-- User List -->
      <div class="card">
        <div class="card-title" data-i18n="existingUsers">Existing Users</div>
        <table id="users-table">
          <thead>
            <tr>
              <th>ID</th>
              <th data-i18n="username">Username</th>
              <th data-i18n="role">Role</th>
              <th data-i18n="actions">Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- Loaded via JS -->
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <footer class="footer">
    Hana Microelectronics Public Co., Ltd. | Dev by <span>Watcharapong W.</span> IT Eng.
  </footer>

  <script src="i18n.js?v=1.1"></script>
  <script src="api.js?v=1.1"></script>
  <script src="users.js?v=1.1"></script>
</body>
</html>
