<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - it Spare part System</title>
  <link rel="stylesheet" href="styles.css?v=1.1">
</head>
<body class="login-page">
  <div class="login-overlay"></div>
  <div class="login-container">
    <div class="logo-wrapper">
      <span class="logo-text">HANA</span>
    </div>
    <h1 data-i18n="loginSystem">it Spare part System</h1>
    <form id="login-form">
      <input type="text" id="username" placeholder="Username" data-i18n="username" required>
      <input type="password" id="password" placeholder="Password" data-i18n="password" required>
      <button type="submit" data-i18n="login">Login</button>
    </form>
  </div>

  <footer class="footer">
    Hana Microelectronics Public Co., Ltd. | Dev by <span>Watcharapong W.</span> IT Eng.
  </footer>

  <script src="i18n.js?v=1.1"></script>
  <script src="api.js?v=1.1"></script>
  <script src="login.js?v=1.1"></script>
</body>
</html>
