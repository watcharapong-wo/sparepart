<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - IT Spare Part System</title>
  <link rel="icon" type="image/png" href="public/assets/images/logo.png">
  <link rel="stylesheet" href="styles.css?v=1.1">
</head>
<body class="login-page">
  <div class="login-overlay"></div>
  <div class="login-wrapper">
    <div class="login-container">
      <div class="logo-wrapper">
        <span class="logo-text">HANA</span>
      </div>
      <h1 data-i18n="loginSystem">IT Spare Part System</h1>
      <form id="login-form">
        <label class="sr-only" for="username">Username</label>
        <input type="text" id="username" placeholder="Username" data-i18n="username" title="Username" required>
        <label class="sr-only" for="password">Password</label>
        <input type="password" id="password" placeholder="Password" data-i18n="password" title="Password" required>
        <button type="submit" data-i18n="login">Login</button>
      </form>
    </div>
  </div>

  <footer class="footer footer-fixed-bottom">
    Hana Microelectronics Public Co., Ltd. | Dev by <span>Watcharapong W.</span> IT Eng.
  </footer>

  <script src="i18n.js?v=1.4"></script>
  <script src="api.js?v=1.3"></script>
  <script src="login.js?v=1.1"></script>
</body>
</html>
