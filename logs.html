<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs - it Spare part System</title>
    <link rel="stylesheet" href="styles.css?v=1.1">
    <style>
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
        }
        .bg-success { background-color: var(--success); }
        .bg-primary { background-color: var(--primary); }
        .bg-danger { background-color: var(--danger); }
        .bg-secondary { background-color: #6b7280; }
        .bg-info { background-color: #06b6d4; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">it Spare part System <span>- Activity Logs</span></div>
        <div class="nav-links">
            <a href="dashboard.html" data-i18n="dashboard">Dashboard</a>
            <a href="movements.html" data-i18n="movements">Movements</a>
            <a href="index.html" data-role-required="admin,co-admin" data-i18n="spareParts">Spare Parts</a>
            <a href="users.html" data-role-required="admin" data-i18n="manageUsers">Manage Users</a>
            <a href="logs.html" class="active" data-role-required="admin" data-i18n="activityLogs">Activity Logs</a>
            <span id="user-display" style="color: #fff; margin-left: 10px; font-size: 13px;"></span>
            <a href="#" id="logout-btn" data-i18n="logout">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="card full-width">
            <div class="card-title" data-i18n="systemActivityLogs">System Activity Logs</div>
            <div class="table-responsive">
                <table id="logs-table">
                    <thead>
                        <tr>
                            <th data-i18n="timestamp">Timestamp</th>
                            <th data-i18n="user">User</th>
                            <th data-i18n="action">Action</th>
                            <th data-i18n="details">Details</th>
                        </tr>
                    </thead>
                    <tbody id="logs-table-body">
                        <!-- Data will be inserted dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="footer">
        Hana Microelectronics Public Co., Ltd. | Dev by <span>Watcharapong W.</span> IT Eng.
    </footer>

    <script src="i18n.js?v=1.1"></script>
    <script src="api.js?v=1.1"></script>
    <script src="logs.js?v=1.1"></script>
    <script>
        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
