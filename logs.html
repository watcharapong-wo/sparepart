<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs - IT Spare Part System</title>
    <link rel="icon" type="image/png" href="public/assets/images/logo.png">
    <link rel="stylesheet" href="styles.css?v=1.3">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">IT Spare Part System <span>- Activity Logs</span></div>
        <div class="nav-links">
            <a href="dashboard.html" data-i18n="dashboard">Dashboard</a>
            <a href="movements.html" data-role-required="admin,co-admin,staff" data-i18n="movements">Movements</a>
            <a href="index.html" data-role-required="admin,co-admin,staff,viewer" data-i18n="spareParts">Spare Parts</a>
            <a href="users.html" data-role-required="admin" data-i18n="manageUsers">Manage Users</a>
            <a href="logs.html" class="active" data-role-required="admin" data-i18n="activityLogs">Activity Logs</a>
            <span id="user-status" class="nav-user-status"></span>
            <a href="#" id="logout-btn" data-i18n="logout">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="card full-width">
            <div class="card-title" data-i18n="systemActivityLogs">System Activity Logs</div>
            
            <div class="filter-bar filter-bar-panel">
                <div class="stacked-form-group log-filter-field log-filter-field-sm">
                    <label class="filter-label" for="filter-start-date" data-i18n="startDate">Start Date</label>
                    <input type="date" id="filter-start-date" class="filter-input" title="Start date">
                </div>
                <div class="stacked-form-group log-filter-field log-filter-field-sm">
                    <label class="filter-label" for="filter-end-date" data-i18n="endDate">End Date</label>
                    <input type="date" id="filter-end-date" class="filter-input" title="End date">
                </div>
                <div class="stacked-form-group log-filter-field log-filter-field-lg">
                    <label class="filter-label" for="filter-search" data-i18n="searchPlaceholder">Search</label>
                    <input type="text" id="filter-search" data-i18n-placeholder="searchPlaceholder" class="filter-input" title="Search logs">
                </div>
                <div class="filter-actions-row">
                    <button id="btn-filter" class="btn btn-primary filter-action-button" data-i18n="filter">Filter</button>
                    <button id="btn-clear" class="btn btn-secondary filter-action-button btn-secondary-soft" data-i18n="clear">Clear</button>
                    <button id="btn-export" class="btn btn-success filter-action-button" data-i18n="exportCSV">Export to CSV</button>
                </div>
            </div>

            <div class="table-responsive">
                <table id="logs-table">
                    <thead>
                        <tr>
                            <th data-i18n="timestamp">Timestamp</th>
                            <th data-i18n="user">User</th>
                            <th data-i18n="action">Action</th>
                            <th data-i18n="details">Details</th>
                        </tr>
                    </thead>
                    <tbody id="logs-table-body">
                        <!-- Data will be inserted dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="footer">
        Hana Microelectronics Public Co., Ltd. | Dev by <span>Watcharapong W.</span> IT Eng.
    </footer>

    <script src="i18n.js?v=1.4"></script>
    <script src="api.js?v=1.3"></script>
    <script src="logs.js?v=1.3"></script>
</body>
</html>
